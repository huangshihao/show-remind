services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: showremind
      POSTGRES_PASSWORD: showremind
      POSTGRES_DB: showremind
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showremind"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

  scraper:
    build: ./scraper
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped

  web:
    build: { context: ., target: web }
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://showremind:showremind@postgres:5432/showremind?schema=public"
      SCRAPER_BASE_URL: "http://scraper:8001"
      SMTP_HOST: "mailhog"
    ports: ["3000:3000"]
    depends_on: [postgres, scraper, mailhog]

  worker:
    build: { context: ., target: worker }
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://showremind:showremind@postgres:5432/showremind?schema=public"
      SCRAPER_BASE_URL: "http://scraper:8001"
      SMTP_HOST: "mailhog"
    depends_on: [postgres, scraper, mailhog]

volumes:
  pgdata:
