services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: showremind
      POSTGRES_PASSWORD: showremind
      POSTGRES_DB: showremind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showremind"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
